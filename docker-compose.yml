services:
  db:
    image: postgres:16-alpine
    container_name: hipismo_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hipismo
      POSTGRES_PASSWORD: hipismo_dev
      POSTGRES_DB: hipismo
    ports:
      - "5433:5432"
    volumes:
      - hipismo_pgdata:/var/lib/postgresql/data

volumes:
  hipismo_pgdata:
